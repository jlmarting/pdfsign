<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignReady | Firma Documentos PDF</title>
    <meta name="description" content="Una herramienta premium para firmar documentos PDF de forma rápida y segura.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-pen-tool">
                <path d="m12 19 7-7 3 3-7 7-3-3Z" />
                <path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5Z" />
                <path d="m2 2 5 5" />
                <path d="m11 11 5 5" />
            </svg>
            SignReady
        </h1>
        <div id="file-info" class="hidden">
            <span id="filename-display" style="font-size: 0.9rem; color: var(--text-muted);">documento.pdf</span>
        </div>
    </header>

    <main>
        <div id="upload-zone" class="upload-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-file-up">
                <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
                <path d="M14 2v4a2 2 0 0 0 2 2h4" />
                <path d="M12 12v6" />
                <path d="m15 15-3-3-3 3" />
            </svg>
            <h2>Cargar PDF</h2>
            <p>Arrastra tu archivo aquí o haz clic para buscar</p>
            <input type="file" id="file-input" accept="application/pdf" class="hidden">
        </div>

        <section id="editor-section">
            <div class="toolbar">
                <button id="clear-btn" class="btn btn-secondary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-trash-2">
                        <path d="M3 6h18" />
                        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                        <line x1="10" x2="10" y1="11" y2="17" />
                        <line x1="14" x2="14" y1="11" y2="17" />
                    </svg>
                    Limpiar Trazo
                </button>
                <div style="flex: 1;"></div>
                <button id="download-btn" class="btn btn-success">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-download">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" x2="12" y1="15" y2="3" />
                    </svg>
                    Firmar y Descargar
                </button>
            </div>

            <div class="pdf-viewport" id="pdf-viewport">
                <div id="loading-overlay" class="loading-overlay">
                    <div class="spinner" style="display: block;"></div>
                </div>
                <canvas id="pdf-canvas"></canvas>
                <canvas id="drawing-canvas"></canvas>
            </div>
        </section>
    </main>

    <div id="toast" class="toast">Mensaje de notificación</div>

    <script type="module" src="main.js"></script>
</body>

</html>
